<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- cozy amber-hour drink, pixel style -->
  <rect width="32" height="32" rx="6" fill="#1c1208"/>
  <!-- glass outline -->
  <rect x="9"  y="7"  width="14" height="2" fill="#c8b49a"/>
  <rect x="9"  y="9"  width="2"  height="14" fill="#c8b49a"/>
  <rect x="21" y="9"  width="2"  height="14" fill="#c8b49a"/>
  <rect x="9"  y="23" width="14" height="2" fill="#c8b49a"/>
  <!-- amber liquid -->
  <rect x="11" y="14" width="10" height="9" fill="#9c560a"/>
  <rect x="11" y="14" width="10" height="2" fill="#f0dab8" opacity="0.55"/>
  <rect x="11" y="20" width="10" height="3" fill="#7a4007"/>
  <!-- straw -->
  <rect x="18" y="5"  width="2"  height="11" fill="#b82020"/>
  <!-- steam / glow -->
  <rect x="13" y="3"  width="2"  height="3" fill="#f0dab8" opacity="0.4"/>
  <rect x="16" y="2"  width="2"  height="3" fill="#f0dab8" opacity="0.3"/>
</svg>
