# Production server: serve the built SPA and reverse-proxy the API/WS to the
# Go backend. This replaces the dev-only proxy in vite.config.ts.
# "amber-backend" is the K8s Service name on port 8080.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA: serve files, fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API
    location /api/ {
        proxy_pass http://amber-backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded files served by the backend
    location /uploads/ {
        proxy_pass http://amber-backend:8080;
        proxy_set_header Host $host;
    }

    # Health passthrough (handy for debugging behind the proxy)
    location = /healthz { proxy_pass http://amber-backend:8080; }
    location = /readyz  { proxy_pass http://amber-backend:8080; }

    # WebSocket: requires HTTP/1.1 + Upgrade/Connection headers
    location /ws {
        proxy_pass http://amber-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
