---
apiVersion: batch/v1
kind: Job
metadata:
  name: amber-db-init
  namespace: khing
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: default
      restartPolicy: Never
      containers:
        - name: db-init
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: "pg-test-pgbouncer.boe.svc"
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: "postgres"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: amber-secrets
                  key: DB_PASSWORD
            - name: PGSSLMODE
              value: "require"
          command:
            - sh
            - -c
            - |
              set -e
              # Ensure the database exists. Through a shared PgBouncer the
              # 'postgres' maintenance DB may be unreachable and CREATE DATABASE
              # may be disallowed, so treat this as best-effort — the schema
              # step below is what must succeed against amber_hour.
              if psql -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='amber_hour'" 2>/dev/null | grep -q 1; then
                echo "database amber_hour already exists"
              else
                psql -d postgres -c "CREATE DATABASE amber_hour" 2>/dev/null \
                  && echo "database amber_hour created" \
                  || echo "could not reach 'postgres' db — assuming amber_hour is managed externally"
              fi
              psql -d amber_hour -v ON_ERROR_STOP=1 -f /migrations/001_schema.sql
              echo "schema applied"
              MENU_COUNT=$(psql -d amber_hour -tAc "SELECT COUNT(*) FROM menu_items")
              if [ "$MENU_COUNT" -eq 0 ]; then
                psql -d amber_hour -v ON_ERROR_STOP=1 -f /migrations/002_seed.sql
                echo "menu seeded"
              else
                echo "menu already has $MENU_COUNT items, skipping seed"
              fi
              echo "done"
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: amber-migrations
