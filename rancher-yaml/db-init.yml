---
apiVersion: v1
kind: ConfigMap
metadata:
  name: amber-migrations
  namespace: khing
data:
  001_schema.sql: |
    CREATE TABLE IF NOT EXISTS access_codes (
        code        TEXT PRIMARY KEY,
        is_active   BOOLEAN NOT NULL DEFAULT TRUE,
        created_at  TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS sessions (
        id          BIGSERIAL PRIMARY KEY,
        nickname    TEXT NOT NULL,
        role        TEXT NOT NULL CHECK (role IN ('customer', 'staff')),
        joined_at   TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS menu_items (
        id           BIGSERIAL PRIMARY KEY,
        category     TEXT NOT NULL,
        name         TEXT NOT NULL,
        description  TEXT NOT NULL DEFAULT '',
        price        NUMERIC(10,2) NOT NULL,
        is_available BOOLEAN NOT NULL DEFAULT TRUE
    );

    CREATE TABLE IF NOT EXISTS messages (
        id           BIGSERIAL PRIMARY KEY,
        sender_nick  TEXT NOT NULL,
        role         TEXT NOT NULL,
        content      TEXT NOT NULL,
        type         TEXT NOT NULL DEFAULT 'chat' CHECK (type IN ('chat', 'whisper', 'system')),
        target_nick  TEXT,
        created_at   TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS messages_created_at_idx ON messages (created_at DESC);

    ALTER TABLE messages
        ADD COLUMN IF NOT EXISTS media_url  TEXT,
        ADD COLUMN IF NOT EXISTS deleted_at TIMESTAMPTZ,
        ADD COLUMN IF NOT EXISTS reply_to   BIGINT,
        ADD COLUMN IF NOT EXISTS edited_at  TIMESTAMPTZ;

    CREATE TABLE IF NOT EXISTS reactions (
        message_id  BIGINT      NOT NULL,
        nick        TEXT        NOT NULL,
        emoji       TEXT        NOT NULL,
        created_at  TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        PRIMARY KEY (message_id, nick, emoji)
    );

    CREATE TABLE IF NOT EXISTS users (
        id            BIGSERIAL PRIMARY KEY,
        username      TEXT NOT NULL,
        password_hash TEXT NOT NULL,
        role          TEXT NOT NULL DEFAULT 'customer' CHECK (role IN ('customer', 'staff')),
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE UNIQUE INDEX IF NOT EXISTS users_username_lower_idx ON users (lower(username));

    ALTER TABLE users ADD COLUMN IF NOT EXISTS balance NUMERIC(10,2) NOT NULL DEFAULT 300;

    CREATE INDEX IF NOT EXISTS users_balance_idx ON users (balance DESC);

    CREATE TABLE IF NOT EXISTS orders (
        id             BIGSERIAL PRIMARY KEY,
        customer_nick  TEXT NOT NULL,
        status         TEXT NOT NULL DEFAULT 'pending' CHECK (status IN ('pending', 'served', 'cancelled')),
        created_at     TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS orders_customer_nick_idx ON orders (customer_nick);

    CREATE TABLE IF NOT EXISTS order_items (
        id           BIGSERIAL PRIMARY KEY,
        order_id     BIGINT NOT NULL REFERENCES orders (id) ON DELETE CASCADE,
        menu_item_id BIGINT NOT NULL REFERENCES menu_items (id),
        qty          INT NOT NULL DEFAULT 1
    );

    CREATE TABLE IF NOT EXISTS guestbook (
        id         BIGSERIAL PRIMARY KEY,
        nick       TEXT NOT NULL,
        message    TEXT NOT NULL,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS song_history (
        id         BIGSERIAL PRIMARY KEY,
        video_id   TEXT NOT NULL,
        added_by   TEXT NOT NULL,
        played_at  TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    INSERT INTO access_codes (code) VALUES ('amber2024'), ('staff-secret') ON CONFLICT DO NOTHING;
  002_seed.sql: |
    INSERT INTO menu_items (category, name, description, price) VALUES
        ('cocktail',  'Amber Sour',           'Whiskey, lemon, honey, bitters',              280),
        ('cocktail',  'Midnight Bloom',       'Gin, elderflower, lavender, tonic',           260),
        ('cocktail',  'Golden Hour',          'Rum, mango, lime, chili salt rim',            270),
        ('cocktail',  'Smoked Old Fashioned', 'Bourbon, demerara, bitters, applewood smoke', 320),
        ('cocktail',  'Neon Negroni',         'Gin, Campari, sweet vermouth, orange peel',   290),
        ('cocktail',  'Espresso Martini',     'Vodka, cold brew, coffee liqueur, foam',      300),
        ('cocktail',  'Paper Plane',          'Bourbon, Aperol, Amaro, lemon',               310),
        ('mocktail',  'Virgin Mojito',        'Lime, mint, soda, cane sugar',                110),
        ('mocktail',  'Sunset Cooler',        'Passionfruit, orange, grenadine, soda',       120),
        ('light',     'Yuzu Soda',            'Fresh yuzu juice, sparkling water',           120),
        ('light',     'Butterfly Pea',        'Blue pea flower tea, lemon, honey',            90),
        ('light',     'Hojicha Latte',        'Roasted green tea, steamed milk',             130),
        ('light',     'Sparkling Grape',      'White grape, lime, sparkling water',          100),
        ('snack',     'Truffle Fries',        'Double-fried with truffle oil, parmesan',     180),
        ('snack',     'Bruschetta',           'Tomato, basil, aged balsamic',                160),
