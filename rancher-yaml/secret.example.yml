# Template for the cluster Secret. The real values are NOT committed (see .gitignore).
#
# Create the real Secret once, manually, before deploying:
#   1. cp secret.example.yml secret.yml
#   2. Fill in the real values below.
#   3. kubectl apply -f secret.yml          # stays local; never pushed to git
#
# Keys consumed by:
#   DATABASE_URL, REDIS_URL, GOOGLE_AI_KEY, JWT_SECRET  -> backend (envFrom amber-secrets)
#   DB_PASSWORD                                         -> db-init Job (PGPASSWORD via secretKeyRef)
apiVersion: v1
kind: Secret
metadata:
  name: amber-secrets
  namespace: khing
type: Opaque
stringData:
  DATABASE_URL: "postgres://postgres:REPLACE_ME@pg-test-pgbouncer.boe.svc:5432/amber_hour?sslmode=require&default_query_exec_mode=simple_protocol"
  REDIS_URL: "redis://redis:6379"
  GOOGLE_AI_KEY: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME"
  # Raw Postgres password (un-encoded) used by the db-init Job's psql client.
  DB_PASSWORD: "REPLACE_ME"
