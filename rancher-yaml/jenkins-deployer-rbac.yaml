# Grants the Jenkins pod's ServiceAccount (system:serviceaccount:jenkins:jenkins)
# permission to deploy into the `khing` namespace. Apply this ONCE, manually:
#
#   kubectl apply -f rancher-yaml/jenkins-deployer-rbac.yaml
#
# If you lack rights to create it, ask whoever administers the `khing`
# project/cluster to apply this file.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-deployer
  namespace: khing
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-deployer
  namespace: khing
subjects:
  - kind: ServiceAccount
    name: jenkins             # from the Forbidden error: system:serviceaccount:jenkins:jenkins
    namespace: jenkins
roleRef:
  kind: Role
  name: jenkins-deployer
  apiGroup: rbac.authorization.k8s.io
